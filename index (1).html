<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFO — Digitaal Forensisch Onderzoek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #060c18; color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; }
    #root { height: 100%; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0b1220; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 99px; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .blink { animation: blink 1.4s infinite; }

    /* Top bar */
    #topbar { background: #0b1220; border-bottom: 1px solid #1e293b; padding: 0 24px; height: 54px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .logo-icon { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg,#1d4ed8,#1e40af); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .topbar-title { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .topbar-sub { font-size: 11px; color: #475569; }
    .confidential { background: #450a0a; border: 1px solid #7f1d1d; padding: 4px 12px; border-radius: 6px; font-size: 11px; color: #fca5a5; font-weight: 600; }
    #clock { font-size: 12px; color: #475569; font-family: 'JetBrains Mono', monospace; }

    /* Stats */
    #statsbar { background: #0b1220; border-bottom: 1px solid #1e293b; padding: 12px 24px; display: flex; gap: 8px; flex-shrink: 0; }
    .stat-card { flex: 1; background: #0f172a; border: 1px solid #1e293b; border-radius: 10px; padding: 12px 16px; }
    .stat-value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; }
    .stat-label { font-size: 11px; color: #64748b; margin-top: 4px; }

    /* Layout */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    #sidebar { width: 300px; background: #0b1220; border-right: 1px solid #1e293b; display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar-header { padding: 12px 16px; border-bottom: 1px solid #1e293b; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 1px; }
    #sidebar-list { overflow-y: auto; flex: 1; }
    .case-row { cursor: pointer; padding: 16px; border-bottom: 1px solid #1e293b; transition: background 0.12s; border-left: 3px solid transparent; }
    .case-row:hover { background: #0c1526; }
    .case-row.selected { background: #0d1e36; border-left-color: #3b82f6; }
    .case-device { font-size: 14px; font-weight: 600; color: #f1f5f9; margin-bottom: 2px; }
    .case-id { font-size: 11px; color: #475569; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
    .case-progress-row { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }

    /* Badge */
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; border: 1px solid; margin-bottom: 8px; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* Tag */
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .tags { display: flex; gap: 4px; flex-wrap: wrap; }

    /* Progress bar */
    .progress-track { background: #1e293b; border-radius: 99px; height: 6px; width: 100%; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 1s ease; }

    /* Detail panel */
    #detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #case-header { background: #0b1220; border-bottom: 1px solid #1e293b; padding: 18px 24px; flex-shrink: 0; }
    .case-header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .case-header-id { font-size: 20px; font-weight: 700; color: #f1f5f9; font-family: 'JetBrains Mono', monospace; margin-right: 10px; }
    .meta-grid { display: flex; gap: 28px; flex-wrap: wrap; margin-top: 10px; }
    .meta-item-label { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-bottom: 3px; }
    .meta-item-value { font-size: 13px; color: #cbd5e1; font-weight: 500; }
    .hash-row { margin-top: 12px; display: inline-flex; align-items: center; gap: 8px; background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; padding: 5px 12px; }
    .hash-label { font-size: 10px; color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
    .hash-value { font-size: 11px; color: #60a5fa; font-family: 'JetBrains Mono', monospace; }

    /* Risk circle */
    .risk-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .risk-label { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Tabs */
    #tabs { background: #0b1220; border-bottom: 1px solid #1e293b; display: flex; padding: 0 24px; flex-shrink: 0; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; padding: 12px 20px; font-size: 13px; font-family: inherit; font-weight: 500; color: #475569; transition: all 0.12s; }
    .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    /* Content */
    #content { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* Section card */
    .section-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; overflow: hidden; }
    .section-title { padding: 12px 20px; border-bottom: 1px solid #1e293b; background: #0b1525; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 1px; }
    .section-body { padding: 16px 20px; }

    /* Findings table */
    .findings-totals { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #1e293b; }
    .totals-cell { padding: 16px 20px; }
    .totals-cell:first-child { border-right: 1px solid #1e293b; }
    .totals-value { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .totals-sub { font-size: 12px; color: #64748b; margin-top: 3px; }
    .table-header { display: grid; grid-template-columns: 2fr 1fr 1fr 140px; padding: 8px 20px; border-bottom: 1px solid #1e293b; background: #0b1525; }
    .table-header span { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; }
    .table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 140px; align-items: center; padding: 13px 20px; border-bottom: 1px solid #1e293b; }
    .table-row:last-child { border-bottom: none; }
    .table-cat { display: flex; align-items: center; gap: 9px; font-weight: 500; color: #e2e8f0; }
    .table-count { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #94a3b8; }
    .table-flagged { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
    .mini-bar-track { background: #1e293b; border-radius: 99px; height: 5px; margin-top: 4px; }
    .mini-bar-fill { height: 100%; border-radius: 99px; }
    .pct-label { font-size: 10px; color: #475569; }

    /* Empty state */
    .empty-state { padding: 48px 24px; text-align: center; }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-title { font-size: 15px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: #334155; }

    /* Timeline */
    .timeline-wrap { padding: 20px 24px 20px 52px; position: relative; }
    .timeline-line { position: absolute; left: 32px; top: 24px; bottom: 24px; width: 2px; background: #1e293b; border-radius: 99px; }
    .timeline-item { position: relative; margin-bottom: 24px; }
    .timeline-dot { position: absolute; left: -20px; top: 3px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #0f172a; }
    .timeline-date { font-size: 11px; color: #475569; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
    .timeline-event { font-size: 14px; font-weight: 500; color: #e2e8f0; }

    /* Details grid */
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-cell { background: #0f172a; border: 1px solid #1e293b; border-radius: 10px; padding: 14px 18px; }
    .detail-key { font-size: 10px; color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
    .detail-val { font-size: 14px; color: #e2e8f0; font-weight: 500; }
    .hash-code { font-size: 12px; color: #60a5fa; font-family: 'JetBrains Mono', monospace; word-break: break-all; background: #060c18; padding: 10px 14px; border-radius: 6px; border: 1px solid #1e293b; margin-bottom: 10px; }
    .hash-note { font-size: 12px; color: #64748b; line-height: 1.6; }

    .flex-gap { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div id="root">

  <!-- TOP BAR -->
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo-icon">🔍</div>
      <div>
        <div class="topbar-title">Digitaal Forensisch Onderzoek</div>
        <div class="topbar-sub">Politie Nederland · Beveiligd systeem</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <span id="clock"></span>
      <span class="confidential">🔒 VERTROUWELIJK</span>
    </div>
  </div>

  <!-- STATS BAR -->
  <div id="statsbar">
    <div class="stat-card"><div class="stat-value" style="color:#f1f5f9" id="st-total">4</div><div class="stat-label">Actieve zaken</div></div>
    <div class="stat-card"><div class="stat-value" style="color:#eab308" id="st-analyse">1</div><div class="stat-label">In analyse</div></div>
    <div class="stat-card"><div class="stat-value" style="color:#f97316" id="st-wacht">1</div><div class="stat-label">Wacht op toegang</div></div>
    <div class="stat-card"><div class="stat-value" style="color:#22c55e" id="st-klaar">1</div><div class="stat-label">Extractie klaar</div></div>
    <div class="stat-card"><div class="stat-value" style="color:#ef4444" id="st-flagged">0</div><div class="stat-label">Items gemarkeerd</div></div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-header">4 apparaten in beheer</div>
      <div id="sidebar-list"></div>
    </div>

    <!-- DETAIL -->
    <div id="detail">
      <div id="case-header">
        <div class="case-header-top">
          <div style="flex:1">
            <div class="flex-gap" style="margin-bottom:10px">
              <span class="case-header-id" id="hdr-id"></span>
              <span id="hdr-badge"></span>
              <span id="hdr-tags" class="tags"></span>
            </div>
            <div class="meta-grid" id="hdr-meta"></div>
            <div class="hash-row" style="margin-top:12px">
              <span class="hash-label">SHA-256</span>
              <span class="hash-value" id="hdr-hash"></span>
            </div>
          </div>
          <div class="risk-wrap" style="margin-left:20px">
            <svg id="risk-svg" width="64" height="64" viewBox="0 0 64 64">
              <circle cx="32" cy="32" r="24" fill="none" stroke="#1e293b" stroke-width="5"/>
              <circle id="risk-arc" cx="32" cy="32" r="24" fill="none" stroke-width="5" stroke-linecap="round" transform="rotate(-90 32 32)" style="transition:stroke-dashoffset 1s ease"/>
              <text id="risk-text" x="32" y="37" text-anchor="middle" font-size="14" font-family="monospace" font-weight="700"></text>
            </svg>
            <span class="risk-label" id="risk-label"></span>
          </div>
        </div>
      </div>

      <!-- TABS -->
      <div id="tabs">
        <button class="tab-btn active" data-tab="bevindingen">📊 Bevindingen</button>
        <button class="tab-btn" data-tab="tijdlijn">🕐 Tijdlijn</button>
        <button class="tab-btn" data-tab="details">ℹ️ Apparaatdetails</button>
      </div>

      <!-- CONTENT PANELS -->
      <div id="content">
        <div id="tab-bevindingen"></div>
        <div id="tab-tijdlijn" class="hidden"></div>
        <div id="tab-details" class="hidden"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CASES = [
  {
    id: "ZD-2026-0041", device: "iPhone 15 Pro", imei: "352099001761481",
    seized: "02-03-2026", officer: "Rechercheur van Dijk",
    status: "EXTRACTIE_COMPLEET", progress: 100, tags: ["Fraude","Witwassen"],
    findings: [
      { type:"Berichten",      icon:"💬", count:4821, flagged:34 },
      { type:"Foto's",         icon:"🖼️", count:1203, flagged:12 },
      { type:"Locatiedata",    icon:"📍", count:9821, flagged:88 },
      { type:"Contacten",      icon:"👤", count:312,  flagged:7  },
      { type:"Verwijderd",     icon:"🗑️", count:441,  flagged:22 },
    ],
    timeline:[
      {date:"02-03-2026 14:22", event:"In beslag genomen",       type:"intake"},
      {date:"03-03-2026 09:05", event:"UFED extractie gestart",  type:"process"},
      {date:"03-03-2026 11:43", event:"Extractie voltooid",      type:"success"},
      {date:"04-03-2026 08:30", event:"Analyse begonnen",        type:"process"},
      {date:"07-03-2026 16:00", event:"Rapport gegenereerd",     type:"success"},
    ],
    integrity:"a3f2c1b9d4e78f0a1b2c3d4e5f6789abc012345", riskScore:87
  },
  {
    id: "ZD-2026-0038", device: "Samsung Galaxy S24", imei: "490154203237518",
    seized: "28-02-2026", officer: "Rechercheur Bakker",
    status: "ANALYSE_LOPEND", progress: 62, tags: ["Drugshandel"],
    findings: [
      { type:"Berichten",   icon:"💬", count:2103, flagged:91 },
      { type:"Foto's",      icon:"🖼️", count:887,  flagged:5  },
      { type:"Locatiedata", icon:"📍", count:5302, flagged:44 },
      { type:"Contacten",   icon:"👤", count:198,  flagged:18 },
      { type:"Verwijderd",  icon:"🗑️", count:203,  flagged:31 },
    ],
    timeline:[
      {date:"28-02-2026 19:55", event:"In beslag genomen",          type:"intake"},
      {date:"01-03-2026 07:00", event:"Faraday-zak geplaatst",      type:"process"},
      {date:"01-03-2026 13:12", event:"UFED extractie gestart",     type:"process"},
      {date:"01-03-2026 15:30", event:"Extractie voltooid",         type:"success"},
      {date:"02-03-2026 10:00", event:"Analyse lopend...",          type:"active"},
    ],
    integrity:"b7e3a2c1d9f0e1b4c5d6e7f890abcdef123456", riskScore:73
  },
  {
    id: "ZD-2026-0029", device: "Google Pixel 8", imei: "359876043210987",
    seized: "18-02-2026", officer: "Rechercheur Smit",
    status: "WACHT_OP_ONTGRENDELING", progress: 15, tags: ["Cybercrime","Identiteitsfraude"],
    findings: [],
    timeline:[
      {date:"18-02-2026 11:30", event:"In beslag genomen",                   type:"intake"},
      {date:"18-02-2026 12:00", event:"Faraday-zak geplaatst",               type:"process"},
      {date:"19-02-2026 09:00", event:"Pincode-aanvraag rechtbank ingediend",type:"process"},
      {date:"25-02-2026 14:00", event:"Wacht op rechterlijk bevel",          type:"warning"},
    ],
    integrity:"—", riskScore:51
  },
  {
    id: "ZD-2026-0055", device: "iPhone 13", imei: "356789012345678",
    seized: "09-03-2026", officer: "Rechercheur van Dijk",
    status: "NIEUW_INTAKE", progress: 5, tags: ["Bedreiging","Stalking"],
    findings: [],
    timeline:[
      {date:"09-03-2026 22:14", event:"In beslag genomen",           type:"intake"},
      {date:"10-03-2026 08:00", event:"Ingecheckt bij digitaal lab", type:"process"},
    ],
    integrity:"—", riskScore:38
  }
];

const STATUS = {
  EXTRACTIE_COMPLEET:     {label:"Extractie compleet",     color:"#22c55e", bg:"#22c55e18", border:"#22c55e44"},
  ANALYSE_LOPEND:         {label:"Analyse lopend",         color:"#eab308", bg:"#eab30818", border:"#eab30844"},
  WACHT_OP_ONTGRENDELING: {label:"Wacht op ontgrendeling", color:"#f97316", bg:"#f9731618", border:"#f9731644"},
  NIEUW_INTAKE:           {label:"Nieuw — intake",         color:"#60a5fa", bg:"#60a5fa18", border:"#60a5fa44"},
};
const TL_COLORS = {intake:"#60a5fa",process:"#64748b",success:"#22c55e",warning:"#f97316",active:"#eab308"};

let selected = CASES[0];
let activeTab = "bevindingen";

// Clock
function tickClock() {
  const n = new Date();
  document.getElementById("clock").textContent =
    n.toLocaleDateString("nl-NL") + " · " + n.toLocaleTimeString("nl-NL");
}
tickClock(); setInterval(tickClock, 1000);

// Stats
function updateStats() {
  const allFlagged = CASES.flatMap(c=>c.findings).reduce((s,f)=>s+(f.flagged||0),0);
  document.getElementById("st-total").textContent   = CASES.length;
  document.getElementById("st-analyse").textContent = CASES.filter(c=>c.status==="ANALYSE_LOPEND").length;
  document.getElementById("st-wacht").textContent   = CASES.filter(c=>c.status==="WACHT_OP_ONTGRENDELING").length;
  document.getElementById("st-klaar").textContent   = CASES.filter(c=>c.status==="EXTRACTIE_COMPLEET").length;
  document.getElementById("st-flagged").textContent = allFlagged;
}
updateStats();

function badge(status) {
  const s = STATUS[status];
  const blink = status==="ANALYSE_LOPEND" ? ' class="blink"' : '';
  return `<span class="badge" style="color:${s.color};background:${s.bg};border-color:${s.border}">
    <span class="badge-dot${status==="ANALYSE_LOPEND"?" blink":""}" style="background:${s.color}"></span>${s.label}</span>`;
}

function progressBar(value, status) {
  const color = STATUS[status].color;
  return `<div class="progress-track"><div class="progress-fill" style="width:${value}%;background:${color};box-shadow:0 0 8px ${color}55"></div></div>`;
}

// Sidebar
function renderSidebar() {
  const list = document.getElementById("sidebar-list");
  list.innerHTML = CASES.map(c => `
    <div class="case-row${selected.id===c.id?" selected":""}" onclick="selectCase('${c.id}')">
      <div class="case-device">${c.device}</div>
      <div class="case-id">${c.id}</div>
      ${badge(c.status)}
      ${progressBar(c.progress, c.status)}
      <div class="case-progress-row">
        <div class="tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
        <span style="font-size:12px;font-weight:700;color:${STATUS[c.status].color};font-family:monospace">${c.progress}%</span>
      </div>
    </div>
  `).join("");
}

// Header
function renderHeader() {
  document.getElementById("hdr-id").textContent = selected.id;
  document.getElementById("hdr-badge").innerHTML = badge(selected.status);
  document.getElementById("hdr-tags").innerHTML = selected.tags.map(t=>`<span class="tag">${t}</span>`).join("");
  document.getElementById("hdr-hash").textContent = selected.integrity;

  const meta = [["Apparaat",selected.device],["IMEI",selected.imei],["In beslag",selected.seized],["Rechercheur",selected.officer]];
  document.getElementById("hdr-meta").innerHTML = meta.map(([k,v])=>`
    <div><div class="meta-item-label">${k}</div>
    <div class="meta-item-value" style="font-family:${k==="IMEI"?"'JetBrains Mono',monospace":"inherit"}">${v}</div></div>
  `).join("");

  // Risk circle
  const score = selected.riskScore;
  const color = score>=75?"#ef4444":score>=50?"#eab308":"#22c55e";
  const label = score>=75?"Hoog risico":score>=50?"Gemiddeld risico":"Laag risico";
  const r=24, circ=2*Math.PI*r, offset=circ-(score/100)*circ;
  const arc = document.getElementById("risk-arc");
  arc.setAttribute("stroke", color);
  arc.setAttribute("stroke-dasharray", circ);
  arc.setAttribute("stroke-dashoffset", offset);
  document.getElementById("risk-text").setAttribute("fill",color);
  document.getElementById("risk-text").textContent = score;
  document.getElementById("risk-label").textContent = label;
}

// Tab: Bevindingen
function renderBevindingen() {
  const s = selected;
  const statusSection = `
    <div class="section-card">
      <div class="section-title">Extractiestatus</div>
      <div class="section-body">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          ${badge(s.status)}
          <span style="font-size:16px;font-weight:700;color:${STATUS[s.status].color};font-family:monospace">${s.progress}%</span>
        </div>
        ${progressBar(s.progress, s.status)}
      </div>
    </div>`;

  let dataSection = "";
  if (s.findings.length > 0) {
    const total = s.findings.reduce((a,f)=>a+f.count,0);
    const flagged = s.findings.reduce((a,f)=>a+f.flagged,0);
    const rows = s.findings.map(f=>{
      const pct = Math.round((f.flagged/f.count)*100);
      const fc = f.flagged>50?"#ef4444":f.flagged>15?"#eab308":"#22c55e";
      return `<div class="table-row">
        <div class="table-cat"><span style="font-size:17px">${f.icon}</span> ${f.type}</div>
        <div class="table-count">${f.count.toLocaleString("nl")}</div>
        <div class="table-flagged" style="color:${fc}">⚑ ${f.flagged}</div>
        <div><div class="pct-label">${pct}%</div>
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${fc}"></div></div>
        </div>
      </div>`;
    }).join("");

    dataSection = `
      <div class="section-card">
        <div class="section-title">Geëxtraheerde data</div>
        <div class="findings-totals">
          <div class="totals-cell"><div class="totals-value" style="color:#f1f5f9">${total.toLocaleString("nl")}</div><div class="totals-sub">Totaal geëxtraheerde items</div></div>
          <div class="totals-cell"><div class="totals-value" style="color:#ef4444">${flagged}</div><div class="totals-sub">Gemarkeerd voor review</div></div>
        </div>
        <div class="table-header"><span>Categorie</span><span>Totaal</span><span>Gemarkeerd</span><span>% Gemarkeerd</span></div>
        ${rows}
      </div>`;
  } else {
    dataSection = `
      <div class="section-card">
        <div class="empty-state">
          <div class="empty-icon">📱</div>
          <div class="empty-title">Geen data beschikbaar</div>
          <div class="empty-sub">Extractie is nog niet gestart of wacht op toegang tot het apparaat.</div>
        </div>
      </div>`;
  }
  document.getElementById("tab-bevindingen").innerHTML = statusSection + dataSection;
}

// Tab: Tijdlijn
function renderTijdlijn() {
  const items = selected.timeline.map(e=>`
    <div class="timeline-item">
      <div class="timeline-dot" style="background:${TL_COLORS[e.type]};box-shadow:0 0 8px ${TL_COLORS[e.type]}88"></div>
      <div class="timeline-date">${e.date}</div>
      <div class="timeline-event">${e.event}</div>
    </div>`).join("");

  document.getElementById("tab-tijdlijn").innerHTML = `
    <div class="section-card">
      <div class="section-title">Keten van bewaring — Chain of Custody</div>
      <div class="timeline-wrap">
        <div class="timeline-line"></div>
        ${items}
      </div>
    </div>`;
}

// Tab: Details
function renderDetails() {
  const s = selected;
  const cells = [
    ["Model",s.device], ["IMEI",s.imei], ["Zaakcode",s.id], ["Inbeslagnamedatum",s.seized],
    ["Rechercheur",s.officer], ["Status",STATUS[s.status].label],
    ["Delicten",s.tags.join(", ")], ["Risicoscore",`${s.riskScore} / 100`]
  ].map(([k,v])=>`
    <div class="detail-cell">
      <div class="detail-key">${k}</div>
      <div class="detail-val" style="font-family:${["IMEI","Zaakcode"].includes(k)?"'JetBrains Mono',monospace":"inherit"}">${v}</div>
    </div>`).join("");

  document.getElementById("tab-details").innerHTML = `
    <div class="details-grid">${cells}</div>
    <div class="section-card" style="margin-top:0">
      <div class="section-title">Forensische integriteitswaarde (SHA-256)</div>
      <div class="section-body">
        <div class="hash-code">${s.integrity}</div>
        <div class="hash-note">Berekend bij eerste extractie en geverifieerd bij elke volgende toegang. Een afwijking duidt op compromittering van het bewijsmateriaal.</div>
      </div>
    </div>`;
}

function renderAll() {
  renderSidebar();
  renderHeader();
  renderBevindingen();
  renderTijdlijn();
  renderDetails();
  showTab(activeTab);
}

function showTab(tab) {
  activeTab = tab;
  ["bevindingen","tijdlijn","details"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("hidden", t!==tab);
  });
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.tab===tab);
  });
}

function selectCase(id) {
  selected = CASES.find(c=>c.id===id);
  activeTab = "bevindingen";
  renderAll();
}

// Tab click
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>showTab(btn.dataset.tab));
});

renderAll();
</script>
</body>
</html>
